          const [confirmDialog, setConfirmDialog] = useState(null);
          const fileInputRef = useRef(null);
          const notifTimeout = useRef(null);

          const [newUpgrade, setNewUpgrade] = useState("");
          const [recruitName, setRecruitName] = useState("");
          const [recruitType, setRecruitType] = useState("Survivor");
          const [recruitKeyword, setRecruitKeyword] = useState("Neutral");
          const [newEq, setNewEq] = useState("");
          const [newSkill, setNewSkill] = useState("");
          const [selectedInjury, setSelectedInjury] = useState("Chest Wound (8)");

          // Derived constants for rules calculations
          const baseDef = BASE_TYPES[baseType] || BASE_TYPES["The Farm House"];
          const currentCapacity = baseDef.capacity + (baseUpgrades.filter(u => u === "Bunk Beds").length * 2);

          const showNotify = (msg) => {
            if (notifTimeout.current) clearTimeout(notifTimeout.current);
            setNotification(msg);
            notifTimeout.current = setTimeout(() => setNotification(null), 4000);
          };

          const pushState = (stateUpdates) => {
            const nextState = { ...currentData, ...stateUpdates };
            const newHistory = history.slice(0, historyIndex + 1);
            newHistory.push(nextState);
            if (newHistory.length > 50) newHistory.shift();
            setHistory(newHistory);
            setHistoryIndex(newHistory.length - 1);
          };

          const handleUndo = () => { if (historyIndex > 0) setHistoryIndex(historyIndex - 1); };
          const handleRedo = () => { if (historyIndex < history.length - 1) setHistoryIndex(historyIndex + 1); };

          const handleExportBackup = () => {
            const dataToSave = {
              version: "1.9",
              timestamp: new Date().toISOString(),
              squadName, squad, baseType, baseUpgrades, scavengePoints
            };
            const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${squadName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_backup.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showNotify("Backup file downloaded successfully.");
          };

          const handleImportClick = () => {
            setConfirmDialog({
              message: "WARNING: Restoring a backup will completely overwrite your current roster and base progress. Proceed?",
              onConfirm: () => { fileInputRef.current?.click(); setConfirmDialog(null); }
            });
          };

          const handleFileImport = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.squad && importedData.baseType) {
                  const migratedSquad = importedData.squad.map(c => ({ 
                    ...c, 
                    injuries: c.injuries || [],
                    level: c.level || 0,
                    experience: c.experience || 0,
                    loot: c.loot || 0,
                    heavyLoot: c.heavyLoot || 0,
                    kills: c.kills || 0,
                    ooaManual: c.ooaManual || false,
                    recovering: c.recovering || false
                  }));
                  
                  let migratedBaseType = importedData.baseType;
                  if (migratedBaseType === 'Farmhouse') migratedBaseType = 'The Farm House';
                  if (!BASE_TYPES[migratedBaseType]) migratedBaseType = 'The Farm House';

                  if (importedData.squadName) setSquadName(importedData.squadName);
                  pushState({
                    squad: migratedSquad,
                    baseType: migratedBaseType,
                    baseUpgrades: importedData.baseUpgrades || [],
                    scavengePoints: importedData.scavengePoints || 0
                  });
                  showNotify("Backup restored successfully. Welcome back.");
                  setMode('base');
                } else {
                  showNotify("ERROR: Invalid or corrupted backup file format.");
                }
              } catch (error) {
                showNotify("ERROR: Failed to parse the backup file.");
              }
            };
            reader.readAsText(file);
            event.target.value = '';
          };

          const updateCharacterState = (id, field, delta) => {
            pushState({
              squad: squad.map(char => {
                if (char.id === id) {
                  let newValue = char[field] + delta;
                  if (newValue < 0) newValue = 0;
                  if (field === 'damage' && newValue > char.stats.DC) newValue = char.stats.DC;
                  return { ...char, [field]: newValue };
                }
                return char;
              })
            });
          };

          const toggleOOA = (id) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  const nextOOA = !c.ooaManual;
                  // REQ: Clearing OOA should reset damage if needed to restore activity
                  return { 
                    ...c, 
                    ooaManual: nextOOA,
                    damage: !nextOOA && c.damage >= c.stats.DC ? c.stats.DC - 1 : c.damage
                  };
                }
                return c;
              })
            });
          };

          const toggleOverwatch = (id) => {
            pushState({ squad: squad.map(char => char.id === id ? { ...char, overwatch: !char.overwatch } : char) });
          };

          const resetTurnTrackers = () => {
            setConfirmDialog({
              message: "CRITICAL: Purge turn-based telemetry? (Clears Overwatch & Noise tokens for all members. Ammo remains intact.)",
              onConfirm: () => {
                pushState({ squad: squad.map(char => ({ ...char, noise: 0, overwatch: false })) });
                setConfirmDialog(null);
              }
            });
          };

          const handleAddBaseUpgrade = () => {
            if (!newUpgrade.trim()) return;
            const cost = UPGRADE_DATA[newUpgrade];
            
            if (scavengePoints < cost) {
              showNotify(`ERROR: Not enough Scavenge Points. ${newUpgrade} costs ${cost} SP.`); return;
            }
            if (baseUpgrades.length >= baseDef.spaces) {
              showNotify("ERROR: No empty plots available in current Refuge!"); return;
            }
            
            pushState({ 
              baseUpgrades: [...baseUpgrades, newUpgrade.trim()],
              scavengePoints: scavengePoints - cost
            });
            setNewUpgrade("");
            showNotify(`${newUpgrade} constructed successfully.`);
          };

          const handleRemoveBaseUpgrade = (index) => {
            pushState({ baseUpgrades: baseUpgrades.filter((_, i) => i !== index) });
          };

          const handleRecruit = () => {
            if (!recruitName.trim()) return;
            if (squad.length >= currentCapacity) {
              showNotify(`ERROR: Base at maximum capacity (${currentCapacity})!`); return;
            }
            const newChar = {
              id: Date.now(), name: recruitName.trim(), type: recruitType, keyword: recruitKeyword,
              level: 0, experience: 0,
              stats: { AP: 6, CQC: 3, FA: 3, S: 3, E: 3, DC: 3, C: 3, I: 3 },
              damage: 0, ammo: 0, noise: 0, overwatch: false, loot: 0, heavyLoot: 0, kills: 0, ooaManual: false, recovering: false,
              equipment: [], specialRules: ["None"], skills: [], injuries: []
            };
            pushState({ squad: [...squad, newChar] });
            setRecruitName("");
            showNotify(`${newChar.name} added to the roster.`);
          };

          const handleRemoveCharacter = (id) => {
            const char = squad.find(c => c.id === id);
            setConfirmDialog({
              message: `Permanently remove ${char.name} from the roster? (KIA/Exiled/Captured)`,
              onConfirm: () => {
                pushState({ squad: squad.filter(c => c.id !== id) });
                if (selectedCharId === id) setSelectedCharId(null);
                setConfirmDialog(null);
              }
            });
          };

          const permanentlyUpdateStat = (id, stat, delta) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  return { ...c, stats: { ...c.stats, [stat]: Math.max(1, c.stats[stat] + delta) } };
                }
                return c;
              })
            });
          };

          const addListAttribute = (id, listName, value, resetFn) => {
            if (!value.trim()) return;
            pushState({ squad: squad.map(c => c.id === id ? { ...c, [listName]: [...c[listName], value.trim()] } : c) });
            resetFn("");
          };

          const removeListAttribute = (id, listName, index) => {
            pushState({ squad: squad.map(c => c.id === id ? { ...c, [listName]: c[listName].filter((_, i) => i !== index) } : c) });
          };

          const applyInjury = (id) => {
            const injuryDef = INJURY_TABLE.find(i => i.name === selectedInjury);
            if (!injuryDef) return;

            if (injuryDef.effect === "KIA") {
              handleRemoveCharacter(id);
              return;
            }

            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  let updatedStats = { ...c.stats };
                  let updatedInjuries = [...(c.injuries || [])];

                  if (injuryDef.effect !== "NONE") {
                    updatedStats[injuryDef.effect] = Math.max(1, updatedStats[injuryDef.effect] + injuryDef.penalty);
                  }
                  
                  if (!injuryDef.name.includes("Full Recovery")) {
                    updatedInjuries.push(injuryDef.name);
                  }

                  return { ...c, stats: updatedStats, injuries: updatedInjuries };
                }
                return c;
              })
            });
            showNotify(`Applied ${injuryDef.name} to character.`);
          };

          const removeInjuryLog = (charId, injuryIndex) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === charId) {
                  const newInjuries = c.injuries.filter((_, i) => i !== injuryIndex);
                  return { ...c, injuries: newInjuries };
                }
                return c;
              })
            });
          };

          const handleSetSP = () => {
            const val = window.prompt("Enter new Scavenge Points total:", scavengePoints);
            if (val !== null && !isNaN(parseInt(val))) {
              pushState({ scavengePoints: Math.max(0, parseInt(val)) });
            }
          };

          const toggleRecovery = (id) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  const nextRecovering = !c.recovering;
                  // REQ: Releasing from recovery clears OOA and resets damage if needed
                  return { 
                    ...c, 
                    recovering: nextRecovering,
                    ooaManual: nextRecovering ? c.ooaManual : false,
                    damage: !nextRecovering && c.damage >= c.stats.DC ? c.stats.DC - 1 : c.damage
                  };
                }
                return c;
              })
            });
          };

          const selectedChar = squad.find(c => c.id === selectedCharId);

          return (
            <div className="h-full w-full flex flex-col relative selection:bg-red-900 selection:text-white">
              <div className="absolute inset-0 pointer-events-none opacity-30 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-stone-950 to-black z-0"></div>
              
              <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileImport} style={{ display: 'none' }} />

              {notification && (
                <div className="absolute top-4 left-1/2 -translate-x-1/2 z-50 bg-amber-500 text-stone-950 px-4 py-2 rounded-md font-bold font-mono text-sm shadow-[0_0_20px_rgba(245,158,11,0.6)] flex items-center gap-2 max-w-[90vw] text-center transition-all animate-in slide-in-from-top-4">
                  <AlertTriangle size={18} className="shrink-0" /> 
                  <span className="leading-tight">{notification}</span>
                </div>
              )}
              {confirmDialog && (
                <div className="absolute inset-0 z-50 bg-black/80 flex items-center justify-center backdrop-blur-sm p-4">
                  <div className="bg-stone-900 border border-red-900 p-6 rounded-sm max-w-md w-full shadow-[0_0_30px_rgba(220,38,38,0.3)]">
                    <div className="flex items-center gap-3 text-red-500 mb-4">
                      <AlertTriangle size={24} />
                      <h3 className="text-lg font-black uppercase tracking-wider">Confirm Action</h3>
                    </div>
                    <p className="font-mono text-sm text-stone-300 mb-6">{confirmDialog.message}</p>
                    <div className="flex gap-3 justify-end">
                      <button onClick={() => setConfirmDialog(null)} className="px-4 py-3 border border-stone-600 text-stone-400 hover:bg-stone-800 active:bg-stone-700 active:scale-95 rounded-sm font-mono text-xs uppercase transition-all">Cancel</button>
                      <button onClick={confirmDialog.onConfirm} className="px-4 py-3 bg-red-950 border border-red-800 text-red-400 hover:bg-red-900 hover:text-white active:bg-red-800 active:scale-95 rounded-sm font-mono text-xs uppercase transition-all">Confirm Execute</button>
                    </div>
                  </div>
                </div>
              )}

              <header className="flex-none p-2 md:p-3 border-b-2 border-red-900/40 bg-stone-900/80 shadow-[0_4px_20px_rgba(0,0,0,0.7)] z-10 flex flex-wrap justify-between items-center gap-2">
                <div className="flex-1 min-w-0 pr-2">
                  <input 
                    type="text"
                    value={squadName}
                    onChange={(e) => setSquadName(e.target.value)}
                    className="w-full bg-transparent border-b border-transparent hover:border-red-900/50 focus:border-red-600 focus:outline-none text-xl md:text-2xl font-black text-red-600 tracking-widest uppercase drop-shadow-[0_0_8px_rgba(220,38,38,0.5)] transition-colors truncate"
                    placeholder="ENTER SQUAD NAME"
                  />
                  <p className="text-[10px] md:text-xs font-mono text-stone-500 uppercase tracking-widest hidden sm:block truncate mt-1">
                    LD:ZA // {mode === 'tactical' ? 'Combat Tactical Roster' : 'Base Management System'}
                  </p>
                </div>
                
                <div className="flex items-center gap-2 shrink-0">
                  <div className="flex border-r border-stone-700 pr-2 mr-1 gap-1">
                    <button onClick={handleUndo} disabled={historyIndex === 0} title="Undo Action" className="flex items-center justify-center p-2 bg-stone-950 hover:bg-stone-800 active:bg-stone-700 active:scale-95 disabled:opacity-30 disabled:active:scale-100 text-stone-400 rounded-sm font-mono text-[10px] border border-stone-800 transition-all">
                      <Undo2 size={16} />
                    </button>
                    <button onClick={handleRedo} disabled={historyIndex === history.length - 1} title="Redo Action" className="flex items-center justify-center p-2 bg-stone-950 hover:bg-stone-800 active:bg-stone-700 active:scale-95 disabled:opacity-30 disabled:active:scale-100 text-stone-400 rounded-sm font-mono text-[10px] border border-stone-800 transition-all">
                      <Redo2 size={16} />
                    </button>
                  </div>

                  <div className="flex border-r border-stone-700 pr-2 mr-1 gap-1">
                    <button onClick={handleExportBackup} title="Backup Data" className="flex items-center justify-center px-2 py-2 md:py-1.5 bg-stone-950 hover:bg-stone-800 active:scale-95 text-stone-400 rounded-sm font-mono text-[10px] border border-stone-800 transition-all">
                      <Download size={16} className="lg:mr-1" /> <span className="hidden lg:inline uppercase">Backup</span>
                    </button>
                    <button onClick={handleImportClick} title="Restore Data" className="flex items-center justify-center px-2 py-2 md:py-1.5 bg-stone-950 hover:bg-stone-800 active:scale-95 text-stone-400 rounded-sm font-mono text-[10px] border border-stone-800 transition-all">
                      <Upload size={16} className="lg:mr-1" /> <span className="hidden lg:inline uppercase">Restore</span>
                    </button>
                  </div>

                  {mode === 'tactical' ? (
                    <>
                      <button onClick={resetTurnTrackers} className="flex items-center gap-2 px-3 py-2 bg-stone-950 hover:bg-red-950 active:scale-95 text-stone-400 hover:text-red-400 rounded-sm font-mono text-[10px] md:text-xs tracking-wider uppercase transition-all border border-stone-800 shadow-sm">
                        <Crosshair size={16} /> <span className="hidden sm:inline">End Turn</span>
                      </button>
                      <button onClick={() => setMode('base')} className="flex items-center gap-2 px-3 py-2 bg-stone-800 hover:bg-stone-700 active:scale-95 text-stone-200 rounded-sm font-mono text-[10px] md:text-xs tracking-wider uppercase transition-all border border-stone-600 shadow-sm">
                        <Home size={16} /> <span className="hidden sm:inline">Base MGT</span>
                      </button>
                    </>
                  ) : (
                    <button onClick={() => setMode('tactical')} className="flex items-center gap-2 px-3 py-2 bg-red-950 hover:bg-red-900 active:scale-95 text-red-200 rounded-sm font-mono text-[10px] md:text-xs tracking-wider uppercase transition-all border border-red-800 shadow-[0_0_10px_rgba(153,27,27,0.5)]">
                      <Swords size={16} /> <span className="hidden sm:inline">Tactical Mode</span>
                    </button>
                  )}
                </div>
              </header>

              <main className="flex-1 min-h-0 p-2 z-10 flex flex-col">
                
                {mode === 'tactical' && (
                  <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-1 pb-2">
                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-2 min-h-full content-start">
                      {squad.filter(c => !c.recovering).map((char) => {
                        const isOut = char.damage >= char.stats.DC || char.ooaManual;
                        const hasInjuries = char.injuries && char.injuries.length > 0;

                        return (
                          <div key={char.id} className={`flex flex-col relative rounded-sm overflow-hidden border transition-all duration-200 ${isOut ? 'bg-stone-950 border-red-950/50 grayscale opacity-80' : char.overwatch ? 'bg-stone-900 border-amber-500/80 shadow-[inset_0_0_15px_rgba(245,158,11,0.1),0_0_10px_rgba(245,158,11,0.2)]' : 'bg-stone-900 border-stone-700 shadow-lg'}`}>
                            {isOut && (
                              <div className="absolute inset-0 bg-red-950/30 z-20 flex flex-col items-center justify-center backdrop-blur-[2px]">
                                <Skull size={48} className="text-red-600 mb-1 opacity-90 drop-shadow-md" />
                                <span className="text-xl font-black font-mono text-red-600 tracking-widest uppercase outline-text bg-black/50 px-2 rounded text-center leading-tight">OUT OF ACTION</span>
                              </div>
                            )}
                            
                            <div className="flex-none p-2 bg-stone-950/80 border-b border-stone-800 flex justify-between items-center">
                              <div className="truncate pr-2">
                                <h2 className="text-base font-bold text-stone-100 uppercase tracking-wide truncate">{char.name}</h2>
                                <p className="text-[10px] font-mono text-stone-500 uppercase truncate">
                                  Lvl {char.level} {char.type} <span className="text-red-700/80 mx-1">|</span> {char.keyword}
                                </p>
                              </div>
                              <div className="flex items-center gap-1.5 flex-none">
                                <button 
                                  onClick={() => toggleOOA(char.id)}
                                  className={`p-2 rounded-sm border transition-all active:scale-95 ${isOut ? 'bg-red-600 border-red-500 text-white' : 'bg-stone-800 border-stone-700 text-stone-500 hover:text-red-500'}`}
                                  title="Toggle Out of Action Status"
                                >
                                  <Skull size={14} />
                                </button>
                                <button onClick={() => !isOut && toggleOverwatch(char.id)} disabled={isOut} className={`flex items-center gap-1.5 px-3 py-2 rounded-sm font-mono text-[10px] font-bold uppercase tracking-wider transition-all active:scale-95 ${char.overwatch ? 'bg-amber-500/20 text-amber-500 border border-amber-500/50' : 'bg-stone-800 text-stone-500 border border-stone-700 hover:bg-stone-700 hover:text-stone-300'}`}>
                                  <Crosshair size={14} className={char.overwatch ? 'animate-pulse' : ''} /> {char.overwatch ? 'Watching' : 'Overwatch'}
                                </button>
                              </div>
                            </div>

                            <div className="flex-none p-1.5 bg-stone-950">
                              <div className="grid grid-cols-8 gap-0.5 text-center font-mono">
                                {Object.entries(char.stats).map(([stat, val]) => (
                                  <div key={stat} className="flex flex-col bg-stone-900/50 rounded-sm overflow-hidden border border-stone-800">
                                    <span className="text-[8px] text-stone-500 font-bold bg-stone-950 py-0.5">{stat}</span>
                                    <span className="text-xs font-bold text-stone-300 py-0.5">{val}</span>
                                  </div>
                                ))}
                              </div>
                            </div>

                            <div className="flex-none grid grid-cols-3 gap-1.5 p-2 border-t border-stone-800 bg-stone-900/30">
                              
                              <div className="flex flex-col items-center bg-stone-950/50 border border-stone-800 rounded-sm p-1.5">
                                <div className="flex items-center gap-1 text-[10px] font-mono font-bold text-red-500 mb-1.5"><Heart size={12} /> DMG</div>
                                <div className="flex items-center gap-2">
                                  <button onClick={() => updateCharacterState(char.id, 'damage', -1)} className="w-8 h-8 flex items-center justify-center border border-stone-700 bg-stone-800 active:bg-stone-600 active:scale-95 rounded-sm text-stone-300 transition-all"><Minus size={16}/></button>
                                  <span className={`text-xl font-mono font-black w-6 text-center leading-none ${char.damage > 0 ? 'text-red-500 drop-shadow-[0_0_3px_rgba(239,68,68,0.8)]' : 'text-stone-400'}`}>{char.damage}</span>
                                  <button onClick={() => updateCharacterState(char.id, 'damage', 1)} className="w-8 h-8 flex items-center justify-center border border-stone-700 bg-stone-800 active:bg-stone-600 active:scale-95 rounded-sm text-stone-300 transition-all"><Plus size={16}/></button>
                                </div>
                              </div>

                              <div className="flex flex-col items-center bg-stone-950/50 border border-stone-800 rounded-sm p-1.5 relative">
                                <div className="flex items-center justify-center w-full relative mb-1.5">
                                  <div className="flex items-center gap-1 text-[10px] font-mono font-bold text-blue-400"><ShieldAlert size={12} /> AMMO</div>
                                  <button onClick={() => updateCharacterState(char.id, 'ammo', -char.ammo)} className="absolute right-0 text-stone-600 hover:text-blue-400 active:scale-95 transition-all" title="Reset Ammo to 0"><RotateCcw size={12} /></button>
                                </div>
                                <div className="flex items-center gap-2">
                                  <button onClick={() => updateCharacterState(char.id, 'ammo', -1)} className="w-8 h-8 flex items-center justify-center border border-stone-700 bg-stone-800 active:bg-stone-600 active:scale-95 rounded-sm text-stone-300 transition-all"><Minus size={16}/></button>
                                  <span className={`text-xl font-mono font-black w-6 text-center leading-none ${char.ammo > 0 ? 'text-blue-400 drop-shadow-[0_0_3px_rgba(96,165,250,0.8)]' : 'text-stone-400'}`}>{char.ammo}</span>
                                  <button onClick={() => updateCharacterState(char.id, 'ammo', 1)} className="w-8 h-8 flex items-center justify-center border border-stone-700 bg-stone-800 active:bg-stone-600 active:scale-95 rounded-sm text-stone-300 transition-all"><Plus size={16}/></button>
                                </div>
                              </div>

                              <div className="flex flex-col items-center bg-stone-950/50 border border-stone-800 rounded-sm p-1.5">
                                <div className="flex items-center gap-1 text-[10px] font-mono font-bold text-amber-500 mb-1.5"><Volume2 size={12} /> NOISE</div>
                                <div className="flex items-center gap-2">
                                  <button onClick={() => updateCharacterState(char.id, 'noise', -1)} className="w-8 h-8 flex items-center justify-center border border-stone-700 bg-stone-800 active:bg-stone-600 active:scale-95 rounded-sm text-stone-300 transition-all"><Minus size={16}/></button>
                                  <span className={`text-xl font-mono font-black w-6 text-center leading-none ${char.noise > 0 ? 'text-amber-500 drop-shadow-[0_0_3px_rgba(245,158,11,0.8)]' : 'text-stone-400'}`}>{char.noise}</span>
                                  <button onClick={() => updateCharacterState(char.id, 'noise', 1)} className="w-8 h-8 flex items-center justify-center border border-stone-700 bg-stone-800 active:bg-stone-600 active:scale-95 rounded-sm text-stone-300 transition-all"><Plus size={16}/></button>
                                </div>
                              </div>
                            </div>

                            <div className="flex-none grid grid-cols-3 gap-1.5 p-2 border-t border-stone-800 bg-stone-900/40">
                              <div className="flex flex-col items-center bg-stone-950/50 border border-stone-800 rounded-sm p-1.5">
                                <div className="flex items-center gap-1 text-[10px] font-mono font-bold text-stone-400 mb-1.5"><Skull size={10} /> KILLS</div>
                                <div className="flex items-center gap-1">

                                      )}
                                      {wp && wp.type === 'Melee' && (
                                        <span className="text-[8px] text-red-400 font-mono mt-0.5 font-bold">
                                          CQC: 1D6+{selectedChar.stats.CQC + wp.cqc} | Dmg: 1D6+{selectedChar.stats.S + wp.str}
                                        </span>
                                      )}
                                    </div>
                                    <button onClick={() => removeListAttribute(selectedChar.id, 'equipment', i)} className="text-stone-700 active:text-red-500 p-1 cursor-pointer shrink-0"><Trash2 size={14} /></button>
                                  </div>
                                  )
                                })}
                             </div>
                             <div className="flex gap-2 pt-2 border-t border-stone-800">
                                <select value={newEq} onChange={e => setNewEq(e.target.value)} className="flex-1 bg-stone-950 border border-stone-700 text-stone-200 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 font-mono active:bg-stone-800">
                                   <option value="" disabled>Select Equipment...</option>
                                   {EQUIPMENT_LIST.map(eq => <option key={eq} value={eq}>{eq}</option>)}
                                </select>
                                <button onClick={() => addListAttribute(selectedChar.id, 'equipment', newEq, setNewEq)} className="px-3 py-2 bg-stone-800 active:bg-stone-700 active:scale-95 border border-stone-700 rounded-sm text-stone-300 transition-all"><Plus size={16} /></button>
                             </div>
                          </div>

                          <div className="flex-1 flex flex-col min-h-0">
                             <span className="text-[10px] font-mono text-stone-500 uppercase block mb-1">Learned Skills / Rules</span>
                             <div className="flex flex-col gap-1.5 mb-2 overflow-y-auto custom-scrollbar pr-1">
                                {[...selectedChar.specialRules, ...selectedChar.skills].filter(s => s !== "None").map((skill, i) => (
                                  <div key={i} className="flex justify-between items-center bg-stone-950 border border-stone-800 pl-3 pr-2 py-2 rounded-sm active:bg-stone-900 transition-colors">
                                    <span 
                                      className="text-xs font-mono text-stone-300 truncate cursor-pointer flex-1"
                                      onClick={() => showNotify(TOOLTIPS[skill] || "No description available.")}
                                    >{skill}</span>
                                    {selectedChar.skills.includes(skill) && <button onClick={() => removeListAttribute(selectedChar.id, 'skills', selectedChar.skills.indexOf(skill))} className="text-stone-700 active:text-red-500 ml-2 p-1 cursor-pointer"><Trash2 size={14} /></button>}
                                  </div>
                                ))}
                             </div>
                             <div className="flex gap-2 pt-2 border-t border-stone-800">
                                <select value={newSkill} onChange={e => setNewSkill(e.target.value)} className="flex-1 bg-stone-950 border border-stone-700 text-stone-200 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 font-mono active:bg-stone-800">
                                   <option value="" disabled>Select Skill...</option>
                                   {SKILL_LIST.map(sk => <option key={sk} value={sk}>{sk}</option>)}
                                </select>
                                <button onClick={() => addListAttribute(selectedChar.id, 'skills', newSkill, setNewSkill)} className="px-3 py-2 bg-stone-800 active:bg-stone-700 active:scale-95 border border-stone-700 rounded-sm text-stone-300 transition-all"><Plus size={16} /></button>
                             </div>
                          </div>

                          <div className="flex-none mt-auto pt-4 border-t border-stone-800">
                            <button onClick={() => handleRemoveCharacter(selectedChar.id)} className="w-full flex items-center justify-center gap-2 px-3 py-3 bg-red-950/30 border border-red-900/50 text-red-500 active:bg-red-900 active:text-white active:scale-95 rounded-sm font-mono text-xs uppercase tracking-wider transition-all">
                              <Skull size={16} /> Mark KIA / Exile
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        // Initialize React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
