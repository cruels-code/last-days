            content: '';
            position: absolute;
            width: 6px; height: 6px;
            border: 1px solid #5c7485;
            pointer-events: none;
        }

        const LOCAL_STORAGE_KEY = 'ldza_squad_saves_v2';

        const generateInitialSaves = () => {
          try {
            const stored = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (stored) {
              const parsed = JSON.parse(stored);
              // Ensure we don't load an empty object if user cleared cache but left the key
              if (Object.keys(parsed).length > 0) return parsed;
            }
          } catch (e) {
            console.warn("Failed to retrieve saves from local storage, falling back to defaults.", e);
          }
          
          const saves = {};
          for (const [key, data] of Object.entries(INITIAL_SQUADS)) {
            saves[key] = {
              history: [{
                squadName: data.squadName,
                squad: data.characters,
                baseType: data.baseType,
                baseUpgrades: data.baseUpgrades || [],
                scavengePoints: data.scavengePoints || 0,
                stash: data.stash || []
              }],
              historyIndex: 0
            };
          }
          return saves;
        };

            setSaves(prev => {
              const save = prev[activeSaveId];
              const newHistory = save.history.slice(0, save.historyIndex + 1);
              const nextState = {
                squadName: currentData.squadName,
                squad: currentData.squad,
                baseType: currentData.baseType,
                baseUpgrades: currentData.baseUpgrades,
                scavengePoints: currentData.scavengePoints,
                stash: currentData.stash,
                ...newStateData
              };
              if (newHistory.length >= 50) newHistory.shift();
              return {
                ...prev,
                [activeSaveId]: {
                  history: [...newHistory, nextState],
                  historyIndex: newHistory.length
                }
              };
            });
          };

          const handleUndo = () => {
            if (!activeSaveId) return;
            setSaves(prev => {
              const save = prev[activeSaveId];
              if (save.historyIndex > 0) {
                return { ...prev, [activeSaveId]: { ...save, historyIndex: save.historyIndex - 1 } };
              }
              return prev;
            });
          };

          const handleRedo = () => {
            if (!activeSaveId) return;
            setSaves(prev => {
              const save = prev[activeSaveId];
              if (save.historyIndex < save.history.length - 1) {
                return { ...prev, [activeSaveId]: { ...save, historyIndex: save.historyIndex + 1 } };
              }
              return prev;
            });
          };

          // Derived constants for rules calculations
          const baseDef = BASE_TYPES[baseType] || BASE_TYPES["The Farm House"];
          const currentCapacity = baseDef.capacity + (baseUpgrades.filter(u => u === "Bunk Beds").length * 2);

          const showNotify = (msg) => {
            if (notifTimeout.current) clearTimeout(notifTimeout.current);
            setNotification(msg);
            notifTimeout.current = setTimeout(() => setNotification(null), 4000);
          };

          const handleExportBackup = () => {
            const dataToSave = {
              version: "1.9",
              timestamp: new Date().toISOString(),
              squadName, squad, baseType, baseUpgrades, scavengePoints, stash
            };
            const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${squadName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_backup.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showNotify("Backup file downloaded successfully.");
          };

          const handleImportClick = () => {
            setConfirmDialog({
              message: "WARNING: Restoring a backup will completely overwrite your current roster and base progress. Proceed?",
              onConfirm: () => { fileInputRef.current?.click(); setConfirmDialog(null); }
            });
          };

          const handleFileImport = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.squad && importedData.baseType) {
                  const migratedSquad = importedData.squad.map(c => ({ 
                    ...c, 
                    injuries: c.injuries || [],
                    level: c.level || 0,
                    experience: c.experience || 0,
                    loot: c.loot || 0,
                    heavyLoot: c.heavyLoot || 0,
                    kills: c.kills || 0,
                    ooaManual: c.ooaManual || false,
                    recovering: c.recovering || false,
                    image: c.image || null
                  }));
                  
                  let migratedBaseType = importedData.baseType;
                  if (migratedBaseType === 'Farmhouse') migratedBaseType = 'The Farm House';
                  if (!BASE_TYPES[migratedBaseType]) migratedBaseType = 'The Farm House';

                  pushState({
                    squadName: importedData.squadName || "RESTORED ROSTER",
                    squad: migratedSquad,
                    baseType: migratedBaseType,
                    baseUpgrades: importedData.baseUpgrades || [],
                    scavengePoints: importedData.scavengePoints || 0,
                    stash: importedData.stash || []
                  });
                  showNotify("Backup restored successfully into active slot.");
                  setMode('base');
                } else {
                  showNotify("ERROR: Invalid or corrupted backup file format.");
                }
              } catch (error) {
                showNotify("ERROR: Failed to parse the backup file.");
              }
            };
            reader.readAsText(file);
            event.target.value = '';
          };

          const handleCharImageUploadClick = (charId) => {
             setCropCharId(charId);
             cropInputRef.current?.click();
          };

          const handleCharImageSelect = (event) => {
             const file = event.target.files[0];
             if (!file) return;
             setCropFile(file);
             const reader = new FileReader();
             reader.onload = (e) => {
                setCropSource(e.target.result);
                setCropPos({x: 0, y: 0});
                setCropZoom(1);
             };
             reader.readAsDataURL(file);
             event.target.value = '';
          };

          const handleCropDrag = (e) => {
            if (!cropDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const dx = clientX - cropStart.x;
            const dy = clientY - cropStart.y;
            setCropPos({ x: cropPos.x + dx, y: cropPos.y + dy });
            setCropStart({ x: clientX, y: clientY });
          };

          const handleCancelCrop = () => {
             setCropFile(null);
             setCropSource("");
          };

          const handleSaveCrop = () => {
             if (!cropImgRef.current) return;
             const canvas = document.createElement("canvas");
             canvas.width = 300;
             canvas.height = 300;
             const ctx = canvas.getContext("2d");
             ctx.fillStyle = "#000";
             ctx.fillRect(0, 0, 300, 300);
             const containerRef = document.getElementById("crop-container");
             if (!containerRef) return;
             const scale = 300 / containerRef.clientWidth;
             const drawX = cropPos.x * scale;
             const drawY = cropPos.y * scale;
             const drawW = cropImgRef.current.naturalWidth * cropZoom * scale;
             const drawH = cropImgRef.current.naturalHeight * cropZoom * scale;
             ctx.drawImage(cropImgRef.current, drawX, drawY, drawW, drawH);
             const base64Jpeg = canvas.toDataURL("image/jpeg", 0.7);
             pushState({
                squad: squad.map(c => c.id === cropCharId ? { ...c, image: base64Jpeg } : c)
             });
             handleCancelCrop();
          };

          const updateCharacterState = (id, field, delta) => {
            pushState({
              squad: squad.map(char => {
                if (char.id === id) {
                  let newValue = char[field] + delta;
                  if (newValue < 0) newValue = 0;
                  if (field === 'damage' && newValue > char.stats.DC) newValue = char.stats.DC;
                  return { ...char, [field]: newValue };
                }
                return char;
              })
            });
          };

          const toggleOOA = (id) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  const nextOOA = !c.ooaManual;
                  // REQ: Clearing OOA should reset damage if needed to restore activity
                  return { 
                    ...c, 
                    ooaManual: nextOOA,
                    damage: !nextOOA && c.damage >= c.stats.DC ? c.stats.DC - 1 : c.damage
                  };
                }
                return c;
              })
            });
          };

          const toggleOverwatch = (id) => {
            pushState({ squad: squad.map(char => char.id === id ? { ...char, overwatch: !char.overwatch } : char) });
          };

          const resetTurnTrackers = () => {
            setConfirmDialog({
              message: "CRITICAL: Purge turn-based telemetry? (Clears Overwatch & Noise tokens for all members. Ammo remains intact.)",
              onConfirm: () => {
                pushState({ squad: squad.map(char => ({ ...char, noise: 0, overwatch: false })) });
                setConfirmDialog(null);
              }
            });
          };

          const handleAddBaseUpgrade = () => {
            if (!newUpgrade.trim()) return;
            const cost = UPGRADE_DATA[newUpgrade];
            
            if (scavengePoints < cost) {
              showNotify(`ERROR: Not enough Scavenge Points. ${newUpgrade} costs ${cost} SP.`); return;
            }
            if (baseUpgrades.length >= baseDef.spaces) {
              showNotify("ERROR: No empty plots available in current Refuge!"); return;
            }
            
            pushState({ 
              baseUpgrades: [...baseUpgrades, newUpgrade.trim()],
              scavengePoints: scavengePoints - cost
            });
            setNewUpgrade("");
            showNotify(`${newUpgrade} constructed successfully.`);
          };

          const handleRemoveBaseUpgrade = (index) => {
            pushState({ baseUpgrades: baseUpgrades.filter((_, i) => i !== index) });
          };

          const handleRecruit = () => {
            if (!recruitName.trim()) return;
            if (squad.length >= currentCapacity) {
              showNotify(`ERROR: Base at maximum capacity (${currentCapacity})!`); return;
            }

            // REQ: Automatically assign everything based on Archetype
            const archetype = CHARACTER_ARCHETYPES[recruitType];
            
            const newChar = {
              id: Date.now(), 
              name: recruitName.trim(), 
              type: recruitType, 
              keyword: recruitKeyword,
              level: 0, 
              experience: 0,
              stats: { ...archetype.stats },
              specialRules: [...archetype.rules],
              skills: [...archetype.skills],
              equipment: [...archetype.equipment],
              damage: 0, 
              ammo: 0, 
              noise: 0, 
              overwatch: false, 
              loot: 0, 
              heavyLoot: 0, 
              kills: 0, 
              ooaManual: false, 
              recovering: false,
              injuries: []
            };
            
            pushState({ squad: [...squad, newChar] });
            setRecruitName("");
            showNotify(`${newChar.name} (${recruitType}) recruited to the roster.`);
          };

          const handleRemoveCharacter = (id) => {
            const char = squad.find(c => c.id === id);
            setConfirmDialog({
              message: `Permanently remove ${char.name} from the roster? (KIA/Exiled/Captured)`,
              onConfirm: () => {
                pushState({ squad: squad.filter(c => c.id !== id) });
                if (selectedCharId === id) setSelectedCharId(null);
                setConfirmDialog(null);
              }
            });
          };

          const permanentlyUpdateStat = (id, stat, delta) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  return { ...c, stats: { ...c.stats, [stat]: Math.max(1, c.stats[stat] + delta) } };
                }
                return c;
              })
            });
          };

          const addListAttribute = (id, listName, value, resetFn) => {
            if (!value.trim()) return;
            pushState({ squad: squad.map(c => c.id === id ? { ...c, [listName]: [...c[listName], value.trim()] } : c) });
            resetFn("");
          };

          const removeListAttribute = (id, listName, index) => {
            pushState({ squad: squad.map(c => c.id === id ? { ...c, [listName]: c[listName].filter((_, i) => i !== index) } : c) });
          };

          const applyInjury = (id) => {
            const injuryDef = INJURY_TABLE.find(i => i.name === selectedInjury);
            if (!injuryDef) return;

            if (injuryDef.effect === "KIA") {
              handleRemoveCharacter(id);
              return;
            }

            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  let updatedStats = { ...c.stats };
                  let updatedInjuries = [...(c.injuries || [])];

                  if (injuryDef.effect !== "NONE") {
                    updatedStats[injuryDef.effect] = Math.max(1, updatedStats[injuryDef.effect] + injuryDef.penalty);
                  }
                  
                  if (!injuryDef.name.includes("Full Recovery")) {
                    updatedInjuries.push(injuryDef.name);
                  }

                  return { ...c, stats: updatedStats, injuries: updatedInjuries };
                }
                return c;
              })
            });
            showNotify(`Applied ${injuryDef.name} to character.`);
          };

          const removeInjuryLog = (charId, injuryIndex) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === charId) {
                  const newInjuries = c.injuries.filter((_, i) => i !== injuryIndex);
                  return { ...c, injuries: newInjuries };
                }
                return c;
              })
            });
          };

          const handleSetSP = () => {
            const val = window.prompt("Enter new Scavenge Points total:", scavengePoints);
            if (val !== null && !isNaN(parseInt(val))) {
              pushState({ scavengePoints: Math.max(0, parseInt(val)) });
            }
          };

          const toggleRecovery = (id) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  const nextRecovering = !c.recovering;
                  // REQ: Releasing from recovery clears OOA and resets damage if needed
                  return { 
                    ...c, 
                    recovering: nextRecovering,
                    ooaManual: nextRecovering ? c.ooaManual : false,
                    damage: !nextRecovering && c.damage >= c.stats.DC ? c.stats.DC - 1 : c.damage
                  };
                }
                return c;
              })
            });
          };

          const selectedChar = squad.find(c => c.id === selectedCharId);

          if (!isAuthenticated) return (
             <div className="h-full w-full flex flex-col items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-green-950/20 via-black to-black relative selection:bg-red-900 selection:text-white">
                <div className="scanlines"></div>
                <div className="vignette"></div>
                
                <div className="w-full max-w-md bg-black/80 border border-red-900/50 p-8 rounded-sm shadow-[0_0_40px_rgba(220,38,38,0.15)] backdrop-blur-md z-50 relative">
                  <h1 className="text-3xl text-center stencil text-red-500 mb-8 border-b border-red-900/50 pb-4 tracking-widest flex justify-center items-center gap-3">
                     <ShieldAlert size={28} className="animate-pulse" /> SYSTEM ENCRYPTED
                  </h1>
                  <form onSubmit={handleLogin} className="space-y-6">
                     <div>
                        <label className="block text-red-700 stencil uppercase text-sm mb-2 text-center tracking-widest">Verify Authorization Code</label>
                        <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} className="w-full bg-black border border-red-900 text-red-400 p-4 font-mono text-center text-lg tracking-[0.5em] focus:border-red-500 focus:outline-none placeholder-red-950 transition-colors" autoFocus />
                     </div>
                     <button type="submit" className="w-full bg-red-950/40 border border-red-900 text-red-400 hover:bg-red-900 hover:text-white p-3 stencil uppercase text-lg tracking-widest transition-all shadow-md active:scale-95">BREACH ARCHIVE</button>
                  </form>
                </div>

                {notification && (
                  <div className="absolute top-8 left-1/2 -translate-x-1/2 z-50 bg-red-600/90 text-white px-6 py-3 rounded-sm font-bold font-mono text-sm shadow-[0_0_20px_rgba(220,38,38,0.5)] flex items-center gap-2 transition-all animate-in slide-in-from-top-4">
                    <AlertTriangle size={20} className="shrink-0 animate-pulse" /> 
                    <span>{notification}</span>
                  </div>
                )}
             </div>
          );

          return (
            <div className="h-full w-full flex flex-col relative selection:bg-red-900 selection:text-white">
              <div className="scanlines"></div>
              <div className="vignette"></div>
              <div className="absolute inset-0 pointer-events-none opacity-30 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-green-950 to-black z-0"></div>
              
              {mode === 'menu' && (
                <div className="absolute inset-x-0 inset-y-0 z-40 bg-black/95 flex flex-col items-center justify-center animate-in fade-in zoom-in-95 duration-200 p-4">
                  <div className="w-full max-w-2xl bg-green-950/20 border border-green-800/80 p-8 rounded-sm shadow-[0_0_30px_rgba(74,222,128,0.1)] backdrop-blur-sm z-50">
                    <h1 className="text-4xl text-center stencil text-green-400 mb-8 border-b border-green-900 pb-4 uppercase tracking-widest flex justify-center items-center gap-4"><Activity size={32} className="animate-pulse" /> SQUAD SELECTION</h1>
                    <div className="space-y-4 font-mono">
                      {Object.keys(saves).map(saveId => {
                        const s = saves[saveId].history[saves[saveId].historyIndex];
                        return (
                          <button key={saveId} onClick={() => { setActiveSaveId(saveId); setMode('base'); }} className="w-full text-left p-4 border border-green-900/50 rounded-sm hover:bg-green-900/30 hover:border-green-500 transition-all group flex justify-between items-center">
                            <div>
                              <div className="text-green-300 text-lg stencil uppercase tracking-widest group-hover:text-amber-400">{s.squadName}</div>
                              <div className="text-stone-400 text-xs mt-1">Base: {s.baseType} &nbsp;|&nbsp; Active Members: {s.squad.filter(c=>!c.ooaManual && c.damage < c.stats.DC).length}/{s.squad.length} &nbsp;|&nbsp; SP: {s.scavengePoints}</div>
                            </div>
                            <Activity size={20} className="text-green-800 group-hover:text-green-400" />
                          </button>
                        );
                      })}
                      <button role="button" className="w-full text-left p-4 mt-8 border border-green-900 border-dashed rounded-sm hover:bg-green-900/10 hover:border-green-500 transition-all group flex justify-center items-center opacity-75 hover:opacity-100" onClick={() => { const id = `squad_${Date.now()}`; setSaves(prev => ({...prev, [id]: { historyIndex: 0, history: [{ squadName: "NEW SURVIVORS", squad: [], baseType: "The Farm House", baseUpgrades: [], scavengePoints: 0, stash: [] }] }})); setActiveSaveId(id); setMode('base'); }}>
                         <span className="text-green-500 stencil tracking-widest">+ Initialize New Local Roster</span>
                      </button>
                    </div>
                  </div>
                </div>
              )}

              <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileImport} style={{ display: 'none' }} />

              {notification && (
                <div className="absolute top-4 left-1/2 -translate-x-1/2 z-50 bg-amber-500 text-black px-4 py-2 rounded-md font-bold font-mono text-sm shadow-lg flex items-center gap-2 max-w-[90vw] text-center transition-all animate-in slide-in-from-top-4">
                  <AlertTriangle size={18} className="shrink-0" /> 
                  <span className="leading-tight">{notification}</span>
                </div>
              )}
              {confirmDialog && (
                <div className="absolute inset-0 z-50 bg-black/80 flex items-center justify-center backdrop-blur-sm p-4">
                  <div className="bg-green-950/30 border border-red-900 p-6 rounded-sm max-w-md w-full shadow-xl">
                    <div className="flex items-center gap-3 text-red-500 mb-4">
                      <AlertTriangle size={24} />
                      <h3 className="text-xl stencil uppercase tracking-wider ">Confirm Action</h3>
                    </div>
                    <p className="font-mono text-sm text-green-400 mb-6">{confirmDialog.message}</p>
                    <div className="flex gap-3 justify-end">
                      <button onClick={() => setConfirmDialog(null)} className="px-4 py-3 border border-green-700/80 text-green-500 hover:bg-green-900/40 active:bg-green-800/50 active:scale-95 rounded-sm stencil text-sm uppercase transition-all ">Cancel</button>
                      <button onClick={confirmDialog.onConfirm} className="px-4 py-3 bg-red-950 border border-red-800 text-red-400 hover:bg-red-900 hover:text-white active:bg-red-800 active:scale-95 rounded-sm stencil text-sm uppercase transition-all ">Confirm Execute</button>
                    </div>
                  </div>
                </div>
              )}

              {showHelp && (
                <div className="absolute inset-0 z-50 bg-black/95 overflow-y-auto custom-scrollbar p-2 sm:p-6 flex flex-col items-center animate-in fade-in zoom-in-95 duration-200">
                  <div className="w-full max-w-5xl bg-green-950/30 border border-green-800/80 rounded-sm p-4 sm:p-6 shadow-[0_0_30px_rgba(74,222,128,0.1)] relative my-4 sm:my-10 backdrop-blur-sm">
                    <div className="flex items-center justify-between mb-6 text-green-500 border-b border-green-900/80 pb-4">
                      <div className="flex items-center gap-3">
                        <BookOpen size={24} />
                        <h2 className="stencil uppercase tracking-widest text-xl sm:text-2xl text-blue-400">Rules Reference</h2>
                      </div>
                      <button onClick={() => setShowHelp(false)} className="px-4 py-2 bg-red-950/50 border border-red-900/80 text-red-400 hover:bg-red-900 hover:text-white rounded-sm stencil uppercase transition-all flex items-center gap-2 shadow-sm">
                        <span className="hidden sm:inline">Close Guide</span> <span className="text-xl leading-none">&times;</span>
                      </button>
                    </div>
                    
                    {/* TURN SEQUENCE */}
                    <div className="mb-8 bg-black/50 p-4 border border-amber-900/30 rounded-sm">
                      <h3 className="stencil uppercase tracking-wider text-lg text-amber-500 mb-3 border-b border-amber-900/50 pb-1 flex items-center gap-2">
                        <span className="bg-amber-500 text-black px-2 py-0.5 rounded-sm text-sm">1</span> The Core Turn Sequence
                      </h3>
                      <ol className="list-decimal pl-5 font-mono text-sm text-green-300 space-y-3">
                        <li><strong className="text-amber-400 stencil tracking-wider uppercase">The Menace Phase:</strong> Resolve Noise Tokens; zombies activate, moving towards the loudest noises and attacking if in range.</li>
                        <li><strong className="text-green-400 stencil tracking-wider uppercase">The Action Phase:</strong> Characters maneuver and perform critical actions (e.g., move, scavenge, interact). AP is regenerated.</li>
                        <li><strong className="text-blue-400 stencil tracking-wider uppercase">The Shooting Phase:</strong> Non-engaged, Lock-and-Loaded characters resolve Ranged Attacks with firearms.</li>
                        <li><strong className="text-red-400 stencil tracking-wider uppercase">The Close Quarters Combat Phase:</strong> All models engaged in base contact roll off and fight in desperate melee combat.</li>
                        <li><strong className="text-stone-400 stencil tracking-wider uppercase">The End Phase:</strong> Check for Breaking Points, remove temporary status tokens, and check scenario end conditions.</li>
                      </ol>
                    </div>

                    {/* RANGED WEAPONS */}
                    <div className="mb-8 overflow-x-auto border border-green-900/80 rounded-sm">
                      <h3 className="stencil uppercase tracking-wider text-lg text-blue-400 m-0 p-3 bg-green-950/50 border-b border-green-900/80 flex items-center gap-2">
                        <Crosshair size={18} /> Firearms & Ranged Weapons Table
                      </h3>
                      <table className="w-full text-left border-collapse min-w-[600px] bg-black/80">
                        <thead>
                          <tr className="bg-black stencil text-green-500 tracking-wider text-sm border-b border-green-800/80">
                            <th className="p-2 pl-3">Weapon Name</th>
                            <th className="p-2 text-center">Range</th>
                            <th className="p-2 text-center">FA</th>
                            <th className="p-2 text-center">Str</th>
                            <th className="p-2 text-center">Ammo Cap</th>
                            <th className="p-2 w-1/3">Rules Summary</th>
                          </tr>
                        </thead>
                        <tbody className="font-mono text-xs text-green-300">
                          {Object.entries(WEAPON_DATA).filter(([_, w]) => w.type === 'Ranged').map(([name, w]) => {
                             const tooltip = TOOLTIPS[name] || "";
                             const rulesMatch = tooltip.match(/Rules: (.*?)(?:\. Reload|\. Ammo|$)/);
                             const rulesText = rulesMatch ? rulesMatch[1] : "None";
                             return (
                              <tr key={name} className="border-b border-green-900/40 hover:bg-green-900/40 transition-colors">
                                <td className="p-2 pl-3 font-bold text-green-400 stencil tracking-wider text-sm">{name}</td>
                                <td className="p-2 text-center">{w.range}”</td>
                                <td className="p-2 text-center">{w.fa > 0 ? '+'+w.fa : w.fa}</td>
                                <td className="p-2 text-center text-red-300">{w.str}</td>
                                <td className="p-2 text-center text-blue-400">{w.cap}</td>
                                <td className="p-2 text-[10px] text-green-500/80 leading-tight">{rulesText}</td>
                              </tr>
                             )
                          })}
                        </tbody>
                      </table>
                    </div>

                    {/* CQC WEAPONS */}
                    <div className="mb-8 overflow-x-auto border border-green-900/80 rounded-sm">
                      <h3 className="stencil uppercase tracking-wider text-lg text-red-400 m-0 p-3 bg-green-950/50 border-b border-green-900/80 flex items-center gap-2">
                        <Swords size={18} /> Close Quarters Combat Weapons
                      </h3>
                      <table className="w-full text-left border-collapse min-w-[600px] bg-black/80">
                        <thead>
                          <tr className="bg-black stencil text-green-500 tracking-wider text-sm border-b border-green-800/80">
                            <th className="p-2 pl-3">Weapon Name</th>
                            <th className="p-2 text-center">CQC Mod</th>

                                 >
                                   {INJURY_TABLE.map(inj => (
                                     <option key={inj.name} value={inj.name}>{inj.name} {inj.effect !== "NONE" && inj.effect !== "KIA" ? `(${inj.penalty} ${inj.effect})` : ''}</option>
                                   ))}
                                 </select>
                                 <button onClick={() => applyInjury(selectedChar.id)} className="px-3 py-2 bg-red-950 border border-red-800 active:bg-red-900 active:scale-95 rounded-sm text-red-300 stencil text-xs uppercase transition-all ">Apply</button>
                               </div>
                            </div>

                            <div className="flex flex-col gap-2 pt-2 border-t border-red-900/30">
                              {(selectedChar.ooaManual || selectedChar.damage >= selectedChar.stats.DC) && (
                                <button 
                                  onClick={() => toggleOOA(selectedChar.id)}
                                  className="w-full flex items-center justify-center gap-2 px-3 py-2 bg-red-600 active:bg-red-700 text-white rounded-sm stencil text-xs uppercase transition-all active:scale-95 "
                                >
                                  <HeartPulse size={14} /> Clear Out of Action
                                </button>
                              )}
                              <button 
                                onClick={() => toggleRecovery(selectedChar.id)}
                                className={`w-full flex items-center justify-center gap-2 px-3 py-2 rounded-sm stencil text-xs uppercase transition-all active:scale-95 ${selectedChar.recovering ? 'bg-amber-600 text-white ' : 'bg-green-900/40 text-green-500 hover:text-amber-500'}`}
                              >
                                <Activity size={14} /> {selectedChar.recovering ? 'Release from Recovery' : 'Send to Recovery (Miss Game)'}
                              </button>
                            </div>
                          </div>

                          <div className="flex-none flex flex-col">
                             <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Equipment Cache</span>
                             <div className="flex flex-col gap-1.5 mb-2 pr-1">
                                {selectedChar.equipment.map((eq, i) => {
                                  const wp = WEAPON_DATA[eq];
                                  return (
                                  <div key={i} className="flex justify-between items-center bg-black border border-green-900/80 pl-3 pr-2 py-2 rounded-sm active:bg-green-950/30 transition-colors">
                                    <div 
                                      className="flex flex-col cursor-pointer flex-1 pr-2"
                                      onClick={() => showNotify(TOOLTIPS[eq] || "No description available.")}
                                    >
                                      <span className="text-sm stencil text-green-400 truncate ">{eq}</span>
                                      {wp && wp.type === 'Ranged' && (
                                        <span className="text-[10px] stencil text-blue-400 mt-0.5 tracking-wider">
                                          Rng: {wp.range}" | Hit: {Math.max(2, 7 - selectedChar.stats.FA - wp.fa)}+ | Ammo: {selectedChar.ammo}/{wp.cap}
                                        </span>
                                      )}
                                      {wp && wp.type === 'Melee' && (
                                        <span className="text-[10px] stencil text-red-400 mt-0.5 tracking-wider">
                                          CQC: 1D6+{selectedChar.stats.CQC + wp.cqc} | Dmg: 1D6+{selectedChar.stats.S + wp.str}
                                        </span>
                                      )}
                                    </div>
                                    <div className="flex items-center gap-1 shrink-0">
                                      <button onClick={() => {
                                        const newStash = [...stash, eq];
                                        const newEqs = [...selectedChar.equipment];
                                        newEqs.splice(i, 1);
                                        pushState({
                                          squad: squad.map(c => c.id === selectedChar.id ? { ...c, equipment: newEqs } : c),
                                          stash: newStash
                                        });
                                      }} className="text-green-600/80 hover:text-amber-500 active:scale-95 p-1 cursor-pointer transition-colors" title="Move to Stash"><Box size={14} /></button>
                                      <button onClick={() => removeListAttribute(selectedChar.id, 'equipment', i)} className="text-green-800/80 hover:text-red-500 active:scale-95 p-1 cursor-pointer transition-colors" title="Discard"><Trash2 size={14} /></button>
                                    </div>
                                  </div>
                                  )
                                })}
                             </div>
                             <div className="flex gap-2 pt-2 border-t border-green-900/80">
                                <select value={newEq} onChange={e => setNewEq(e.target.value)} className="flex-1 bg-black border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40">
                                   <option value="" disabled>Select Equipment...</option>
                                   {EQUIPMENT_LIST.map(eq => <option key={eq} value={eq}>{eq}</option>)}
                                </select>
                                <button onClick={() => addListAttribute(selectedChar.id, 'equipment', newEq, setNewEq)} className="px-3 py-2 bg-green-900/40 active:bg-green-800/50 active:scale-95 border border-green-800/80 rounded-sm text-green-400 transition-all stencil "><Plus size={16} /></button>
                             </div>
                          </div>

                          <div className="flex-none flex flex-col">
                             <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Learned Skills / Rules</span>
                             <div className="flex flex-col gap-1.5 mb-2 pr-1">
                                {[...selectedChar.specialRules, ...selectedChar.skills].filter(s => s !== "None").map((skill, i) => (
                                  <div key={i} className="flex justify-between items-center bg-black border border-green-900/80 pl-3 pr-2 py-2 rounded-sm active:bg-green-950/30 transition-colors">
                                    <span 
                                      className="text-sm stencil text-green-400 truncate cursor-pointer flex-1 "
                                      onClick={() => showNotify(TOOLTIPS[skill] || "No description available.")}
                                    >{skill}</span>
                                    {selectedChar.skills.includes(skill) && <button onClick={() => removeListAttribute(selectedChar.id, 'skills', selectedChar.skills.indexOf(skill))} className="text-green-800/80 active:text-red-500 ml-2 p-1 cursor-pointer"><Trash2 size={14} /></button>}
                                  </div>
                                ))}
                             </div>
                             <div className="flex gap-2 pt-2 border-t border-green-900/80">
                                <select value={newSkill} onChange={e => setNewSkill(e.target.value)} className="flex-1 bg-black border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40">
                                   <option value="" disabled>Select Skill...</option>
                                   {SKILL_LIST.map(sk => <option key={sk} value={sk}>{sk}</option>)}
                                </select>
                                <button onClick={() => addListAttribute(selectedChar.id, 'skills', newSkill, setNewSkill)} className="px-3 py-2 bg-green-900/40 active:bg-green-800/50 active:scale-95 border border-green-800/80 rounded-sm text-green-400 transition-all stencil "><Plus size={16} /></button>
                             </div>
                          </div>

                          <div className="flex-none mt-auto pt-4 border-t border-green-900/80">
                            <button onClick={() => handleRemoveCharacter(selectedChar.id)} className="w-full flex items-center justify-center gap-2 px-3 py-3 bg-red-950/30 border border-red-900/50 text-red-500 active:bg-red-900 active:text-white active:scale-95 rounded-sm stencil text-sm uppercase tracking-wider transition-all ">
                              <Skull size={16} /> Mark KIA / Exile
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        // Initialize React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
