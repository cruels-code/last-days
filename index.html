        .custom-scrollbar::-webkit-scrollbar { width: 4px; }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #5c7485; }
        
        .scanlines {
            display: none;
        }
        
        .vignette {
            display: none;
        }

        .hud-border {
            position: relative;
        }
        .hud-border::before, .hud-border::after {
            content: '';
            position: absolute;
            width: 6px; height: 6px;
            border: 1px solid #5c7485;
            pointer-events: none;
        }
        .hud-border::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .hud-border::after { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        .hud-border-danger::before, .hud-border-danger::after {
            border-color: #ef4444;
        }
        
        .stencil {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        
        .typewriter {
            font-family: 'Share Tech Mono', monospace;
        }
    
        body {
            background-color: #000;
            color: #4ade80;
            text-shadow: 0 0 4px rgba(74, 222, 128, 0.4);
        }
        
        /* Scanlines */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Screen flicker */
        @keyframes flicker {
            0% { opacity: 0.95; }
            5% { opacity: 0.85; }
            10% { opacity: 0.95; }
            15% { opacity: 1; }
            100% { opacity: 1; }
        }
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(74, 222, 128, 0.02);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        
        .stencil, .typewriter {
            text-shadow: 0 0 5px currentColor;
        }
        
        /* Custom Scrollbar for terminal */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000; 
            border-left: 1px solid #14532d;
        }
        ::-webkit-scrollbar-thumb {
            background: #166534; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #22c55e; 
        }

        // --- MAIN APPLICATION ---
        function App() {
          const [mode, setMode] = useState('tactical');
          const [squadName, setSquadName] = useState("The Devonshire Rippers");
          
          const [history, setHistory] = useState([{
            squad: initialSquad,
            baseType: 'The Farm House',
            baseUpgrades: [],
            scavengePoints: 0,
            stash: []
          }]);
          const [historyIndex, setHistoryIndex] = useState(0);

          const currentData = history[historyIndex];
          const squad = currentData.squad;
          const baseType = currentData.baseType;
          const baseUpgrades = currentData.baseUpgrades;
          const scavengePoints = currentData.scavengePoints;
          const stash = currentData.stash || [];
          
          const [selectedCharId, setSelectedCharId] = useState(null);
          const [notification, setNotification] = useState(null);
          const [confirmDialog, setConfirmDialog] = useState(null);
          const fileInputRef = useRef(null);
          const notifTimeout = useRef(null);

          const [newUpgrade, setNewUpgrade] = useState("");
          const [recruitName, setRecruitName] = useState("");
          const [recruitType, setRecruitType] = useState(Object.keys(CHARACTER_ARCHETYPES)[1]); // Start with Survivor
          const [recruitKeyword, setRecruitKeyword] = useState("Neutral");
          const [newEq, setNewEq] = useState("");
          const [newStashEq, setNewStashEq] = useState("");
          const [newSkill, setNewSkill] = useState("");
          const [selectedInjury, setSelectedInjury] = useState("Chest Wound (8)");

          // Derived constants for rules calculations
          const baseDef = BASE_TYPES[baseType] || BASE_TYPES["The Farm House"];
          const currentCapacity = baseDef.capacity + (baseUpgrades.filter(u => u === "Bunk Beds").length * 2);

          const showNotify = (msg) => {
            if (notifTimeout.current) clearTimeout(notifTimeout.current);
            setNotification(msg);
            notifTimeout.current = setTimeout(() => setNotification(null), 4000);
          };

          const pushState = (stateUpdates) => {
            const nextState = { ...currentData, ...stateUpdates };
            const newHistory = history.slice(0, historyIndex + 1);
            newHistory.push(nextState);
            if (newHistory.length > 50) newHistory.shift();
            setHistory(newHistory);
            setHistoryIndex(newHistory.length - 1);
          };

          const handleUndo = () => { if (historyIndex > 0) setHistoryIndex(historyIndex - 1); };
          const handleRedo = () => { if (historyIndex < history.length - 1) setHistoryIndex(historyIndex + 1); };

          const handleExportBackup = () => {
            const dataToSave = {
              version: "1.9",
              timestamp: new Date().toISOString(),
              squadName, squad, baseType, baseUpgrades, scavengePoints, stash
            };
            const blob = new Blob([JSON.stringify(dataToSave, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${squadName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_backup.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showNotify("Backup file downloaded successfully.");
          };

          const handleImportClick = () => {
            setConfirmDialog({
              message: "WARNING: Restoring a backup will completely overwrite your current roster and base progress. Proceed?",
              onConfirm: () => { fileInputRef.current?.click(); setConfirmDialog(null); }
            });
          };

          const handleFileImport = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.squad && importedData.baseType) {
                  const migratedSquad = importedData.squad.map(c => ({ 
                    ...c, 
                    injuries: c.injuries || [],
                    level: c.level || 0,
                    experience: c.experience || 0,
                    loot: c.loot || 0,
                    heavyLoot: c.heavyLoot || 0,
                    kills: c.kills || 0,
                    ooaManual: c.ooaManual || false,
                    recovering: c.recovering || false
                  }));
                  
                  let migratedBaseType = importedData.baseType;
                  if (migratedBaseType === 'Farmhouse') migratedBaseType = 'The Farm House';
                  if (!BASE_TYPES[migratedBaseType]) migratedBaseType = 'The Farm House';

                  if (importedData.squadName) setSquadName(importedData.squadName);
                  pushState({
                    squad: migratedSquad,
                    baseType: migratedBaseType,
                    baseUpgrades: importedData.baseUpgrades || [],
                    scavengePoints: importedData.scavengePoints || 0,
                    stash: importedData.stash || []
                  });
                  showNotify("Backup restored successfully. Welcome back.");
                  setMode('base');
                } else {
                  showNotify("ERROR: Invalid or corrupted backup file format.");
                }
              } catch (error) {
                showNotify("ERROR: Failed to parse the backup file.");
              }
            };
            reader.readAsText(file);
            event.target.value = '';
          };

          const updateCharacterState = (id, field, delta) => {
            pushState({
              squad: squad.map(char => {
                if (char.id === id) {
                  let newValue = char[field] + delta;
                  if (newValue < 0) newValue = 0;
                  if (field === 'damage' && newValue > char.stats.DC) newValue = char.stats.DC;
                  return { ...char, [field]: newValue };
                }
                return char;
              })
            });
          };

          const toggleOOA = (id) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  const nextOOA = !c.ooaManual;
                  // REQ: Clearing OOA should reset damage if needed to restore activity
                  return { 
                    ...c, 
                    ooaManual: nextOOA,
                    damage: !nextOOA && c.damage >= c.stats.DC ? c.stats.DC - 1 : c.damage
                  };
                }
                return c;
              })
            });
          };

          const toggleOverwatch = (id) => {
            pushState({ squad: squad.map(char => char.id === id ? { ...char, overwatch: !char.overwatch } : char) });
          };

          const resetTurnTrackers = () => {
            setConfirmDialog({
              message: "CRITICAL: Purge turn-based telemetry? (Clears Overwatch & Noise tokens for all members. Ammo remains intact.)",
              onConfirm: () => {
                pushState({ squad: squad.map(char => ({ ...char, noise: 0, overwatch: false })) });
                setConfirmDialog(null);
              }
            });
          };

          const handleAddBaseUpgrade = () => {
            if (!newUpgrade.trim()) return;
            const cost = UPGRADE_DATA[newUpgrade];
            
            if (scavengePoints < cost) {
              showNotify(`ERROR: Not enough Scavenge Points. ${newUpgrade} costs ${cost} SP.`); return;
            }
            if (baseUpgrades.length >= baseDef.spaces) {
              showNotify("ERROR: No empty plots available in current Refuge!"); return;
            }
            
            pushState({ 
              baseUpgrades: [...baseUpgrades, newUpgrade.trim()],
              scavengePoints: scavengePoints - cost
            });
            setNewUpgrade("");
            showNotify(`${newUpgrade} constructed successfully.`);
          };

          const handleRemoveBaseUpgrade = (index) => {
            pushState({ baseUpgrades: baseUpgrades.filter((_, i) => i !== index) });
          };

          const handleRecruit = () => {
            if (!recruitName.trim()) return;
            if (squad.length >= currentCapacity) {
              showNotify(`ERROR: Base at maximum capacity (${currentCapacity})!`); return;
            }

            // REQ: Automatically assign everything based on Archetype
            const archetype = CHARACTER_ARCHETYPES[recruitType];
            
            const newChar = {
              id: Date.now(), 
              name: recruitName.trim(), 
              type: recruitType, 
              keyword: recruitKeyword,
              level: 0, 
              experience: 0,
              stats: { ...archetype.stats },
              specialRules: [...archetype.rules],
              skills: [...archetype.skills],
              equipment: [...archetype.equipment],
              damage: 0, 
              ammo: 0, 
              noise: 0, 
              overwatch: false, 
              loot: 0, 
              heavyLoot: 0, 
              kills: 0, 
              ooaManual: false, 
              recovering: false,
              injuries: []
            };
            
            pushState({ squad: [...squad, newChar] });
            setRecruitName("");
            showNotify(`${newChar.name} (${recruitType}) recruited to the roster.`);
          };

          const handleRemoveCharacter = (id) => {
            const char = squad.find(c => c.id === id);
            setConfirmDialog({
              message: `Permanently remove ${char.name} from the roster? (KIA/Exiled/Captured)`,
              onConfirm: () => {
                pushState({ squad: squad.filter(c => c.id !== id) });
                if (selectedCharId === id) setSelectedCharId(null);
                setConfirmDialog(null);
              }
            });
          };

          const permanentlyUpdateStat = (id, stat, delta) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  return { ...c, stats: { ...c.stats, [stat]: Math.max(1, c.stats[stat] + delta) } };
                }
                return c;
              })
            });
          };

          const addListAttribute = (id, listName, value, resetFn) => {
            if (!value.trim()) return;
            pushState({ squad: squad.map(c => c.id === id ? { ...c, [listName]: [...c[listName], value.trim()] } : c) });
            resetFn("");
          };

          const removeListAttribute = (id, listName, index) => {
            pushState({ squad: squad.map(c => c.id === id ? { ...c, [listName]: c[listName].filter((_, i) => i !== index) } : c) });
          };

          const applyInjury = (id) => {
            const injuryDef = INJURY_TABLE.find(i => i.name === selectedInjury);
            if (!injuryDef) return;

            if (injuryDef.effect === "KIA") {
              handleRemoveCharacter(id);
              return;
            }

            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  let updatedStats = { ...c.stats };
                  let updatedInjuries = [...(c.injuries || [])];

                  if (injuryDef.effect !== "NONE") {
                    updatedStats[injuryDef.effect] = Math.max(1, updatedStats[injuryDef.effect] + injuryDef.penalty);
                  }
                  
                  if (!injuryDef.name.includes("Full Recovery")) {
                    updatedInjuries.push(injuryDef.name);
                  }

                  return { ...c, stats: updatedStats, injuries: updatedInjuries };
                }
                return c;
              })
            });
            showNotify(`Applied ${injuryDef.name} to character.`);
          };

          const removeInjuryLog = (charId, injuryIndex) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === charId) {
                  const newInjuries = c.injuries.filter((_, i) => i !== injuryIndex);
                  return { ...c, injuries: newInjuries };
                }
                return c;
              })
            });
          };

          const handleSetSP = () => {
            const val = window.prompt("Enter new Scavenge Points total:", scavengePoints);
            if (val !== null && !isNaN(parseInt(val))) {
              pushState({ scavengePoints: Math.max(0, parseInt(val)) });
            }
          };

          const toggleRecovery = (id) => {
            pushState({
              squad: squad.map(c => {
                if (c.id === id) {
                  const nextRecovering = !c.recovering;
                  // REQ: Releasing from recovery clears OOA and resets damage if needed
                  return {

                              className="px-2 py-1 bg-green-900/40 active:bg-green-800/50 text-green-500 text-[10px] border border-green-800/80 rounded-sm cursor-pointer transition-colors text-left"
                            >
                              {p}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div className="flex-none flex flex-col">
                        <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Constructed Upgrades (Tap for info)</span>
                        <div className="flex flex-col gap-1.5 mb-2">
                          {baseUpgrades.length === 0 && <span className="text-xs text-green-700/80 font-mono italic p-1">No upgrades built.</span>}
                          {baseUpgrades.map((upg, i) => (
                            <div key={i} className="flex justify-between items-center bg-black border border-green-900/80 pl-3 pr-2 py-2 rounded-sm active:bg-green-950/30 transition-colors">
                              <span 
                                className="text-sm stencil text-green-400 cursor-pointer flex-1 truncate "
                                onClick={() => showNotify(TOOLTIPS[upg] || "No description available for this custom upgrade.")}
                              >
                                {upg}
                              </span>
                              <button onClick={() => handleRemoveBaseUpgrade(i)} className="text-red-900 active:text-red-500 ml-2 p-1"><Trash2 size={14} /></button>
                            </div>
                          ))}
                        </div>
                        <div className="flex gap-1.5 pt-2 border-t border-green-900/80">
                          <select 
                            value={newUpgrade} 
                            onChange={(e) => setNewUpgrade(e.target.value)} 
                            disabled={baseUpgrades.length >= baseDef.spaces}
                            className="flex-1 bg-black border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider disabled:opacity-50 active:bg-green-900/40"
                          >
                            <option value="" disabled>Select Upgrade...</option>
                            {UPGRADE_LIST.map(u => (
                              <option 
                                key={u} 
                                value={u} 
                                disabled={scavengePoints < UPGRADE_DATA[u]} 
                                className={scavengePoints < UPGRADE_DATA[u] ? "text-green-700/80 bg-green-950/30" : ""}
                              >
                                {u} ({UPGRADE_DATA[u]} SP)
                              </option>
                            ))}
                          </select>
                          <button onClick={handleAddBaseUpgrade} disabled={baseUpgrades.length >= baseDef.spaces} className="px-3 py-2 bg-green-900/40 active:bg-green-800/50 active:scale-95 border border-green-800/80 rounded-sm text-green-400 disabled:opacity-50 transition-all stencil "><Plus size={16} /></button>
                        </div>
                      </div>

                      <div className="flex-none flex flex-col mt-4">
                        <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Base Stash</span>
                        <div className="flex flex-col gap-1.5 mb-2">
                          {stash.length === 0 && <span className="text-xs text-green-700/80 font-mono italic p-1">Stash is empty.</span>}
                          {stash.map((item, i) => (
                            <div key={i} className="flex justify-between items-center bg-black border border-green-900/80 pl-3 pr-2 py-2 rounded-sm active:bg-green-950/30 transition-colors">
                              <span 
                                className="text-sm stencil text-green-400 cursor-pointer flex-1 truncate "
                                onClick={() => showNotify(TOOLTIPS[item] || "No description available.")}
                              >
                                {item}
                              </span>
                              <div className="flex items-center gap-1 shrink-0">
                                <select 
                                  onChange={(e) => {
                                    if(e.target.value) {
                                      const charId = parseInt(e.target.value);
                                      const newStash = [...stash];
                                      newStash.splice(i, 1);
                                      pushState({
                                        squad: squad.map(c => c.id === charId ? { ...c, equipment: [...c.equipment, item] } : c),
                                        stash: newStash
                                      });
                                    }
                                  }}
                                  className="bg-green-950/30 border border-green-800/80 text-green-500 text-[10px] rounded-sm p-1 focus:outline-none focus:border-red-800 stencil tracking-wider w-20"
                                  value=""
                                >
                                  <option value="" disabled>Assign...</option>
                                  {squad.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                                <button onClick={() => {
                                  const newStash = [...stash];
                                  newStash.splice(i, 1);
                                  pushState({ stash: newStash });
                                }} className="text-red-900 hover:text-red-500 active:scale-95 p-1 cursor-pointer transition-colors" title="Discard"><Trash2 size={14} /></button>
                              </div>
                            </div>
                          ))}
                        </div>
                        <div className="flex gap-1.5 pt-2 border-t border-green-900/80">
                          <select 
                            value={newStashEq} 
                            onChange={(e) => setNewStashEq(e.target.value)} 
                            className="flex-1 bg-black border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40"
                          >
                            <option value="" disabled>Add to Stash...</option>
                            {EQUIPMENT_LIST.map(eq => <option key={eq} value={eq}>{eq}</option>)}
                          </select>
                          <button onClick={() => {
                            if(newStashEq) {
                              pushState({ stash: [...stash, newStashEq] });
                              setNewStashEq("");
                            }
                          }} className="px-3 py-2 bg-green-900/40 active:bg-green-800/50 active:scale-95 border border-green-800/80 rounded-sm text-green-400 transition-all stencil "><Plus size={16} /></button>
                        </div>
                      </div>
                    </div>

                    <div className="flex-none lg:flex-1 flex flex-col gap-2 min-h-[500px] lg:min-h-0 overflow-y-auto custom-scrollbar border border-green-900/80 bg-green-950/30 rounded-sm p-3">
                      <div className="flex items-center gap-2 mb-2 text-green-500 border-b border-green-900/80 pb-2 relative">
                        <div className=" absolute bottom-0 left-0 w-full h-1 opacity-30"></div>
                        <UserPlus size={18} /> <h2 className="stencil uppercase tracking-wider text-sm ">Squad Directory</h2>
                      </div>
                      
                      <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-1.5 min-h-[150px]">
                        {squad.map(char => {
                           const isActuallyOut = char.ooaManual || char.damage >= char.stats.DC;
                           return (
                            <button 
                              key={char.id} 
                              onClick={() => setSelectedCharId(char.id)}
                              className={`text-left p-3 rounded-sm border transition-all flex justify-between items-center active:scale-[0.98] ${selectedCharId === char.id ? 'bg-red-950/40 border-red-800/50 shadow-inner' : 'bg-black border-green-900/80 hover:border-green-700/80'}`}
                            >
                              <div>
                                <div className="text-base stencil text-green-300 ">{char.name}</div>
                                <div className="text-[10px] stencil text-green-600/80 uppercase mt-0.5 tracking-wider">
                                  Lvl {char.level} {char.type}
                                  {char.recovering && <span className="ml-2 text-amber-500 font-bold">[RECOVERING]</span>}
                                  {isActuallyOut && !char.recovering && <span className="ml-2 text-red-500 font-bold">[O.O.A]</span>}
                                </div>
                              </div>
                              {isActuallyOut && <Skull size={16} className="text-red-600" />}
                            </button>
                           );
                        })}
                      </div>

                      <div className="mt-2 pt-3 border-t border-green-900/80 bg-black p-3 rounded-sm">
                         <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-2">Recruit Survivor</span>
                         <div className="flex flex-col gap-2">
                           <input type="text" placeholder="Name" value={recruitName} onChange={e => setRecruitName(e.target.value)} className="w-full bg-green-950/30 border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider" />
                           <div className="flex gap-2">
                             <select value={recruitKeyword} onChange={e => setRecruitKeyword(e.target.value)} className="w-1/3 bg-green-950/30 border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40">
                               <option>Selfless</option>
                               <option>Neutral</option>
                               <option>Selfish</option>
                             </select>
                             <select value={recruitType} onChange={e => setRecruitType(e.target.value)} className="flex-1 bg-green-950/30 border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40">
                               {Object.keys(CHARACTER_ARCHETYPES).map(t => <option key={t} value={t}>{t}</option>)}
                             </select>
                             <button onClick={handleRecruit} className="px-4 py-2 bg-green-950 border border-green-800 text-green-400 active:bg-green-900 active:scale-95 rounded-sm stencil text-sm uppercase transition-all "><Plus size={16} /></button>
                           </div>
                         </div>
                      </div>
                    </div>

                    <div className="flex-none lg:flex-1 flex flex-col gap-2 min-h-[500px] lg:min-h-0 overflow-y-auto custom-scrollbar border border-green-900/80 bg-green-950/30 rounded-sm p-3">
                      <div className="flex items-center gap-2 mb-2 text-green-500 border-b border-green-900/80 pb-2 relative">
                        <div className=" absolute bottom-0 left-0 w-full h-1 opacity-30"></div>
                        <Wrench size={18} /> <h2 className="stencil uppercase tracking-wider text-sm ">Character Lab</h2>
                      </div>
                      
                      {!selectedChar ? (
                        <div className="flex-1 flex items-center justify-center text-green-700/80 stencil text-sm text-center p-4 min-h-[150px] tracking-wider uppercase">
                          Select a character from the directory to manage their progression, upgrades, and injuries.
                        </div>
                      ) : (
                        <div className="flex flex-col gap-5 flex-1">
                          <div className="flex-none">
                            <h3 className="text-2xl stencil text-green-200 uppercase tracking-wider ">{selectedChar.name}</h3>
                            <p className="text-[10px] stencil text-green-600/80 uppercase tracking-wider">{selectedChar.type} | {selectedChar.keyword}</p>
                          </div>

                          <div className="flex-none bg-black border border-green-900/80 p-2 rounded-sm grid grid-cols-2 gap-2">
                            <div className="flex flex-col items-center">
                              <span className="stencil uppercase tracking-wider text-xs  text-green-500 mb-1">Experience (XP)</span>
                              <div className="flex items-center gap-2">
                                <button onClick={() => updateCharacterState(selectedChar.id, 'experience', -1)} className="p-1 text-green-600/80 hover:text-green-400 active:scale-95 transition-all"><Minus size={16} /></button>
                                <span className="text-2xl stencil text-blue-400 w-8 text-center ">{selectedChar.experience}</span>
                                <button onClick={() => updateCharacterState(selectedChar.id, 'experience', 1)} className="p-1 text-green-600/80 hover:text-green-400 active:scale-95 transition-all"><Plus size={16} /></button>
                              </div>
                            </div>
                            <div className="flex flex-col items-center border-l border-green-900/80">
                              <span className="stencil uppercase tracking-wider text-xs  text-green-500 mb-1">Level</span>
                              <div className="flex items-center gap-2">
                                <button onClick={() => updateCharacterState(selectedChar.id, 'level', -1)} className="p-1 text-green-600/80 hover:text-green-400 active:scale-95 transition-all"><Minus size={16} /></button>
                                <span className="text-2xl stencil text-amber-500 w-8 text-center ">{selectedChar.level}</span>
                                <button onClick={() => updateCharacterState(selectedChar.id, 'level', 1)} className="p-1 text-green-600/80 hover:text-green-400 active:scale-95 transition-all"><Plus size={16} /></button>
                              </div>
                            </div>
                          </div>

                          <div className="flex-none">
                            <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Permanent Stat Upgrades</span>
                            <div className="grid grid-cols-4 gap-1.5">
                              {Object.entries(selectedChar.stats).map(([stat, val]) => (
                                <div key={stat} className="bg-black border border-green-900/80 rounded-sm flex flex-col items-center p-1.5">
                                  <span className="text-[10px] text-green-600/80 font-bold tracking-wider">{stat}</span>
                                  <div className="flex items-center gap-2 w-full justify-center mt-1">
                                    <button onClick={() => permanentlyUpdateStat(selectedChar.id, stat, -1)} className="text-green-700/80 active:text-green-400 active:scale-95 p-1"><Minus size={12} /></button>
                                    <span className="text-lg stencil text-green-300 w-4 text-center ">{val}</span>
                                    <button onClick={() => permanentlyUpdateStat(selectedChar.id, stat, 1)} className="text-green-700 active:text-green-400 active:scale-95 p-1"><Plus size={12} /></button>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="flex-none bg-red-950/20 border border-red-900/30 p-3 rounded-sm">
                            <div className="flex items-center gap-2 mb-2 text-red-500 border-b border-red-900/30 pb-1">
                              <Activity size={14} /> <span className="stencil uppercase tracking-wider text-sm  block">Medical / Injury Log</span>
                            </div>
                            
                            <div className="flex flex-col gap-1.5 mb-3">
                              {(!selectedChar.injuries || selectedChar.injuries.length === 0) && <span className="text-xs text-green-700/80 font-mono italic p-1">No permanent injuries.</span>}
                              {selectedChar.injuries && selectedChar.injuries.map((inj, i) => (
                                <div key={i} className="flex justify-between items-center bg-red-950/40 border border-red-900/50 px-3 py-2 rounded-sm">
                                  <span className="text-sm stencil text-red-300 truncate ">{inj}</span>
                                  <button onClick={() => removeInjuryLog(selectedChar.id, i)} className="text-red-700 active:text-red-400 ml-2 p-1" title="Remove Record"><Trash2 size={14} /></button>
                                </div>
                              ))}
                            </div>

                            <div className="flex flex-col gap-2 mb-3">
                               <span className="stencil uppercase tracking-wider text-sm  text-green-500">Apply Injury (Rules Pg. 39)</span>
                               <div className="flex gap-2">
                                 <select 
                                   value={selectedInjury} 
                                   onChange={e => setSelectedInjury(e.target.value)} 
                                   className="flex-1 bg-black border border-red-900/50 text-green-300 text-xs rounded-sm p-2 focus:outline-none focus:border-red-500 stencil tracking-wider active:bg-green-900/40"
                                 >
                                   {INJURY_TABLE.map(inj => (
                                     <option key={inj.name} value={inj.name}>{inj.name} {inj.effect !== "NONE" && inj.effect !== "KIA" ? `(${inj.penalty} ${inj.effect})` : ''}</option>
                                   ))}
                                 </select>
                                 <button onClick={() => applyInjury(selectedChar.id)} className="px-3 py-2 bg-red-950 border border-red-800 active:bg-red-900 active:scale-95 rounded-sm text-red-300 stencil text-xs uppercase transition-all ">Apply</button>
                               </div>
                            </div>

                            <div className="flex flex-col gap-2 pt-2 border-t border-red-900/30">
                              {(selectedChar.ooaManual || selectedChar.damage >= selectedChar.stats.DC) && (
                                <button 
                                  onClick={() => toggleOOA(selectedChar.id)}
                                  className="w-full flex items-center justify-center gap-2 px-3 py-2 bg-red-600 active:bg-red-700 text-white rounded-sm stencil text-xs uppercase transition-all active:scale-95 "
                                >
                                  <HeartPulse size={14} /> Clear Out of Action
                                </button>
                              )}
                              <button 
                                onClick={() => toggleRecovery(selectedChar.id)}
                                className={`w-full flex items-center justify-center gap-2 px-3 py-2 rounded-sm stencil text-xs uppercase transition-all active:scale-95 ${selectedChar.recovering ? 'bg-amber-600 text-white ' : 'bg-green-900/40 text-green-500 hover:text-amber-500'}`}
                              >
                                <Activity size={14} /> {selectedChar.recovering ? 'Release from Recovery' : 'Send to Recovery (Miss Game)'}
                              </button>
                            </div>
                          </div>

                          <div className="flex-none flex flex-col">
                             <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Equipment Cache</span>
                             <div className="flex flex-col gap-1.5 mb-2 pr-1">
                                {selectedChar.equipment.map((eq, i) => {
                                  const wp = WEAPON_DATA[eq];
                                  return (
                                  <div key={i} className="flex justify-between items-center bg-black border border-green-900/80 pl-3 pr-2 py-2 rounded-sm active:bg-green-950/30 transition-colors">
                                    <div 
                                      className="flex flex-col cursor-pointer flex-1 pr-2"
                                      onClick={() => showNotify(TOOLTIPS[eq] || "No description available.")}
                                    >
                                      <span className="text-sm stencil text-green-400 truncate ">{eq}</span>
                                      {wp && wp.type === 'Ranged' && (
                                        <span className="text-[10px] stencil text-blue-400 mt-0.5 tracking-wider">
                                          Rng: {wp.range}" | Hit: {Math.max(2, 7 - selectedChar.stats.FA - wp.fa)}+ | Ammo: {selectedChar.ammo}/{wp.cap}
                                        </span>
                                      )}
                                      {wp && wp.type === 'Melee' && (
                                        <span className="text-[10px] stencil text-red-400 mt-0.5 tracking-wider">
                                          CQC: 1D6+{selectedChar.stats.CQC + wp.cqc} | Dmg: 1D6+{selectedChar.stats.S + wp.str}
                                        </span>
                                      )}
                                    </div>
                                    <div className="flex items-center gap-1 shrink-0">
                                      <button onClick={() => {
                                        const newStash = [...stash, eq];
                                        const newEqs = [...selectedChar.equipment];
                                        newEqs.splice(i, 1);
                                        pushState({
                                          squad: squad.map(c => c.id === selectedChar.id ? { ...c, equipment: newEqs } : c),
                                          stash: newStash
                                        });
                                      }} className="text-green-600/80 hover:text-amber-500 active:scale-95 p-1 cursor-pointer transition-colors" title="Move to Stash"><Box size={14} /></button>
                                      <button onClick={() => removeListAttribute(selectedChar.id, 'equipment', i)} className="text-green-800/80 hover:text-red-500 active:scale-95 p-1 cursor-pointer transition-colors" title="Discard"><Trash2 size={14} /></button>
                                    </div>
                                  </div>
                                  )
                                })}
                             </div>
                             <div className="flex gap-2 pt-2 border-t border-green-900/80">
                                <select value={newEq} onChange={e => setNewEq(e.target.value)} className="flex-1 bg-black border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40">
                                   <option value="" disabled>Select Equipment...</option>
                                   {EQUIPMENT_LIST.map(eq => <option key={eq} value={eq}>{eq}</option>)}
                                </select>
                                <button onClick={() => addListAttribute(selectedChar.id, 'equipment', newEq, setNewEq)} className="px-3 py-2 bg-green-900/40 active:bg-green-800/50 active:scale-95 border border-green-800/80 rounded-sm text-green-400 transition-all stencil "><Plus size={16} /></button>
                             </div>
                          </div>

                          <div className="flex-none flex flex-col">
                             <span className="stencil uppercase tracking-wider text-sm  text-green-500 block mb-1">Learned Skills / Rules</span>
                             <div className="flex flex-col gap-1.5 mb-2 pr-1">
                                {[...selectedChar.specialRules, ...selectedChar.skills].filter(s => s !== "None").map((skill, i) => (
                                  <div key={i} className="flex justify-between items-center bg-black border border-green-900/80 pl-3 pr-2 py-2 rounded-sm active:bg-green-950/30 transition-colors">
                                    <span 
                                      className="text-sm stencil text-green-400 truncate cursor-pointer flex-1 "
                                      onClick={() => showNotify(TOOLTIPS[skill] || "No description available.")}
                                    >{skill}</span>
                                    {selectedChar.skills.includes(skill) && <button onClick={() => removeListAttribute(selectedChar.id, 'skills', selectedChar.skills.indexOf(skill))} className="text-green-800/80 active:text-red-500 ml-2 p-1 cursor-pointer"><Trash2 size={14} /></button>}
                                  </div>
                                ))}
                             </div>
                             <div className="flex gap-2 pt-2 border-t border-green-900/80">
                                <select value={newSkill} onChange={e => setNewSkill(e.target.value)} className="flex-1 bg-black border border-green-800/80 text-green-300 text-sm rounded-sm p-2 focus:outline-none focus:border-red-800 stencil tracking-wider active:bg-green-900/40">
                                   <option value="" disabled>Select Skill...</option>
                                   {SKILL_LIST.map(sk => <option key={sk} value={sk}>{sk}</option>)}
                                </select>
                                <button onClick={() => addListAttribute(selectedChar.id, 'skills', newSkill, setNewSkill)} className="px-3 py-2 bg-green-900/40 active:bg-green-800/50 active:scale-95 border border-green-800/80 rounded-sm text-green-400 transition-all stencil "><Plus size={16} /></button>
                             </div>
                          </div>

                          <div className="flex-none mt-auto pt-4 border-t border-green-900/80">
                            <button onClick={() => handleRemoveCharacter(selectedChar.id)} className="w-full flex items-center justify-center gap-2 px-3 py-3 bg-red-950/30 border border-red-900/50 text-red-500 active:bg-red-900 active:text-white active:scale-95 rounded-sm stencil text-sm uppercase tracking-wider transition-all ">
                              <Skull size={16} /> Mark KIA / Exile
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        // Initialize React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
